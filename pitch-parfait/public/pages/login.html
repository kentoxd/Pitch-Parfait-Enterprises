<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>
    <main class="container py-4 py-lg-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="pp-surface p-4 p-md-5">
            <div class="badge rounded-pill pp-badge">Account</div>
            <h2 class="pp-brand mt-2 mb-1">Login to order</h2>
            <p class="pp-muted mb-4">Sign in to add items to cart and place orders.</p>
            <div class="alert alert-warning d-none" id="pp-login-warning">
              Add your Firebase config in <code>public/lib/firebaseConfig.js</code> first.
            </div>
            <form id="pp-login-form">
              <label class="form-label fw-semibold" for="pp-email">Email</label>
              <input id="pp-email" class="form-control form-control-lg mb-3" type="email" required placeholder="you@example.com" />
              <label class="form-label fw-semibold" for="pp-pass">Password</label>
              <input id="pp-pass" class="form-control form-control-lg mb-3" type="password" required placeholder="••••••••" />
              <button type="submit" class="btn pp-btn-primary w-100" id="pp-login-submit">Login</button>
              <a class="btn pp-btn-secondary w-100 mt-2 d-flex align-items-center justify-content-center" href="./register.html">Create account</a>
            </form>
          </div>
        </div>
      </div>
    </main>
    <div id="pp-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
