<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>

    <main class="container py-4 py-lg-5">
      <section class="pp-main-hero mb-4 mb-lg-5">
        <div class="pp-main-hero__overlay">
          <h1 class="pp-main-hero__title">EVERYDAY CELEBRATIONS</h1>
          <div class="pp-main-hero__subtitle">with Pitch Parfait</div>
        </div>
      </section>

      <section class="mb-4 mb-lg-5">
        <h2 class="pp-section-title mb-3">WHAT WE OFFER</h2>
        <div class="row g-3 g-lg-4" id="pp-category-grid"></div>

        <div class="alert alert-warning d-none mt-3" id="pp-firebase-warning" role="alert">
          Firebase config is not set yet. Demo catalog is shown. Update <code>public/lib/firebaseConfig.js</code>.
        </div>
      </section>

      <section class="mt-5">
        <div class="pp-surface p-4 p-md-5">
          <div class="row g-4 align-items-center">
            <div class="col-12 col-lg-7">
              <h3 class="pp-brand" style="margin-bottom:8px;">Subscribe To Our Newsletter</h3>
              <p class="pp-muted mb-0">The latest news and promotional offers delivered straight to your inbox.</p>
            </div>
            <div class="col-12 col-lg-5">
              <form id="pp-newsletter">
                <label class="form-label fw-semibold" for="pp-email">Your Email</label>
                <input class="form-control form-control-lg mb-3" id="pp-email" type="email" placeholder="you@example.com" required />
                <button class="btn pp-btn-primary w-100" type="submit">Subscribe</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="pp-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/home.js"></script>
  </body>
</html>
