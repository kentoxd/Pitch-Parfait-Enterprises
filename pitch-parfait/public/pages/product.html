<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>
    <main class="container py-4 py-lg-5">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="pp-section-title mb-0" id="pp-product-category">Product</h2>
        <a class="btn btn-link pp-muted" id="pp-back-category" href="./home.html">Back</a>
      </div>
      <div class="row g-4">
        <div class="col-12 col-lg-5">
          <div class="pp-surface p-3 p-lg-4 text-center">
            <img id="pp-product-image" alt="Product" style="max-width:100%;height:340px;object-fit:contain;" />
            <div class="fw-semibold mt-2" id="pp-product-name-left"></div>
          </div>
        </div>
        <div class="col-12 col-lg-7">
          <div class="pp-surface p-3 p-lg-4">
            <div class="d-flex align-items-center justify-content-between">
              <h3 class="pp-brand mb-1" id="pp-product-name"></h3>
              <div class="fw-semibold" id="pp-product-base-price"></div>
            </div>
            <div class="pp-muted small mb-3" id="pp-product-desc"></div>

            <div class="pp-surface p-3 mb-3">
              <div class="fw-semibold mb-2">Select Size</div>
              <div class="row g-2" id="pp-size-options"></div>
            </div>

            <div class="pp-surface p-3 mb-3">
              <div class="fw-semibold mb-2">Add Toppings</div>
              <div class="row g-2" id="pp-toppings"></div>
            </div>

            <div class="d-flex align-items-center justify-content-end gap-3">
              <div class="fw-semibold">Total: <span id="pp-total-price">₱0.00</span></div>
              <button class="btn pp-btn-primary" id="pp-add-cart" type="button">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="pp-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/product.js"></script>
  </body>
</html>
