<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>
    <main class="container py-4 py-lg-5">
      <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
          <h2 class="pp-brand mb-1">Admin Dashboard</h2>
          <div class="pp-muted">Manage products and review orders.</div>
        </div>
      </div>

      <div class="alert alert-danger d-none" id="pp-admin-denied">Admin access required.</div>

      <div id="pp-admin-content" class="d-none">
        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <div class="pp-surface p-4">
              <h5 class="fw-semibold mb-3">Add / Edit Product</h5>
              <form id="pp-product-form">
                <input type="hidden" id="pp-product-id" />
                <label class="form-label fw-semibold">Name</label>
                <input class="form-control mb-2" id="pp-name" required />
                <label class="form-label fw-semibold">Category</label>
                <select class="form-select mb-2" id="pp-category" required>
                  <option>Parfait</option>
                  <option>Swirls</option>
                  <option>Shakes</option>
                  <option>Cakes</option>
                </select>
                <label class="form-label fw-semibold">Price</label>
                <input class="form-control mb-2" id="pp-price" type="number" min="0" step="0.01" required />
                <label class="form-label fw-semibold">Image URL</label>
                <input class="form-control mb-2" id="pp-image" required />
                <label class="form-label fw-semibold">Description</label>
                <textarea class="form-control mb-3" id="pp-description" rows="3" required></textarea>
                <div class="d-flex gap-2">
                  <button class="btn pp-btn-primary flex-grow-1" type="submit">Save Product</button>
                  <button class="btn pp-btn-secondary" type="button" id="pp-reset">Reset</button>
                </div>
              </form>
            </div>
          </div>
          <div class="col-12 col-lg-7">
            <div class="pp-surface p-4 mb-4">
              <h5 class="fw-semibold mb-3">Products</h5>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Category</th>
                      <th>Price</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="pp-products-body"></tbody>
                </table>
              </div>
            </div>
            <div class="pp-surface p-4">
              <h5 class="fw-semibold mb-3">Recent Orders</h5>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Order ID</th>
                      <th>User</th>
                      <th>Total</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="pp-orders-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="pp-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
