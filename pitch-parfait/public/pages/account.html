<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>

    <main class="container py-4 py-lg-5">
      <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
          <h2 class="pp-brand mb-1">My Account</h2>
          <div class="pp-muted">Manage your profile and view your order history.</div>
        </div>
      </div>

      <div class="alert alert-danger d-none" id="pp-account-denied">Please log in to view account information.</div>

      <div id="pp-account-content" class="d-none">
        <div class="row g-4 mb-4">
          <div class="col-12">
            <div class="pp-surface p-4">
              <h5 class="fw-semibold mb-3">Account Details</h5>
              <div class="row g-3">
                <div class="col-12 col-md-4">
                  <div class="pp-muted small">Name</div>
                  <div class="fw-semibold" id="pp-account-name">-</div>
                </div>
                <div class="col-12 col-md-4">
                  <div class="pp-muted small">Email</div>
                  <div class="fw-semibold" id="pp-account-email">-</div>
                </div>
                <div class="col-12 col-md-4">
                  <div class="pp-muted small">Role</div>
                  <div class="fw-semibold text-capitalize" id="pp-account-role">-</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="pp-surface p-4">
          <h5 class="fw-semibold mb-3">Order History</h5>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Date</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="pp-account-orders-body"></tbody>
            </table>
          </div>
          <div id="pp-account-orders-empty" class="pp-muted small d-none">No past orders yet.</div>
        </div>
      </div>
    </main>

    <div id="pp-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/account.js"></script>
  </body>
</html>
