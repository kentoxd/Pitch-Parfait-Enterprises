<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>

    <main class="container py-4 py-lg-5">
      <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
          <h2 class="pp-brand" style="margin-bottom:6px;">Your Cart</h2>
          <div class="pp-muted">Adjust quantities, review total, then checkout.</div>
        </div>
        <button class="btn btn-link pp-muted" id="pp-clear" type="button">Clear cart</button>
      </div>

      <div class="alert alert-warning d-none" id="pp-cart-warning" role="alert">
        Firebase config is missing. Cart sync is disabled until <code>public/lib/firebaseConfig.js</code> is set.
      </div>

      <div class="row g-4">
        <div class="col-12 col-lg-8">
          <div class="d-flex flex-column gap-3" id="pp-cart-lines"></div>
          <div class="pp-surface p-4 text-center d-none" id="pp-empty">
            <div class="fw-semibold" style="font-size:1.2rem;">Cart is empty</div>
            <div class="pp-muted mt-2">Let’s fix that with something sweet.</div>
            <div class="mt-4">
              <a class="btn pp-btn-primary" href="./home.html">Browse Menu</a>
            </div>
          </div>
        </div>
        <div class="col-12 col-lg-4">
          <div class="pp-surface p-4">
            <div class="fw-semibold">Order Summary</div>
            <div class="d-flex align-items-center justify-content-between mt-3">
              <div class="pp-muted">Subtotal</div>
              <div class="fw-semibold" id="pp-subtotal">₱0.00</div>
            </div>
            <div class="d-flex align-items-center justify-content-between mt-2">
              <div class="pp-muted">Delivery</div>
              <div class="fw-semibold">₱0.00</div>
            </div>
            <hr />
            <div class="d-flex align-items-center justify-content-between">
              <div class="fw-semibold">Total</div>
              <div class="fw-semibold" id="pp-total">₱0.00</div>
            </div>
            <a class="btn pp-btn-primary w-100 mt-4" href="./checkout.html" id="pp-checkout">Checkout</a>
            <a class="btn btn-link pp-muted w-100 mt-2" href="./home.html">Continue shopping</a>
          </div>
        </div>
      </div>
    </main>

    <div id="pp-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/cart.js"></script>
  </body>
</html>
