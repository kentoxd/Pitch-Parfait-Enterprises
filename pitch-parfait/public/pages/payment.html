<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pitch Parfait — Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="pp-navbar"></div>

    <main class="container py-4 py-lg-5">
      <div class="row g-4">
        <div class="col-12 col-lg-7">
          <div class="pp-surface p-4 p-md-5">
            <div class="badge rounded-pill pp-badge">Payment</div>
            <h2 class="pp-brand" style="margin-top:10px;margin-bottom:6px;">Online Payment (Dummy)</h2>
            <div class="pp-muted">Total amount: <span class="fw-semibold" id="pp-amount">₱0.00</span></div>

            <div class="alert alert-warning d-none mt-3" id="pp-pay-warning" role="alert">
              Missing or invalid <code>orderId</code>. Please go back to checkout.
            </div>

            <form class="mt-4" id="pp-pay-form">
              <div class="mb-3">
                <label class="form-label fw-semibold" for="pp-pay-name">Name</label>
                <input class="form-control form-control-lg" id="pp-pay-name" required placeholder="Your name" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold" for="pp-pay-ref">Reference Number</label>
                <input class="form-control form-control-lg" id="pp-pay-ref" required placeholder="e.g., 1234567890" />
                <div class="form-text">Mock field only. No real payment integration.</div>
              </div>
              <button class="btn pp-btn-primary w-100" type="submit" id="pp-confirm">Confirm Payment</button>
              <a class="btn btn-link pp-muted w-100 mt-2" href="./checkout.html">Back to checkout</a>
            </form>
          </div>
        </div>
        <div class="col-12 col-lg-5">
          <div class="pp-surface p-4">
            <div class="fw-semibold">Order summary</div>
            <div class="mt-3 d-flex flex-column gap-2" id="pp-pay-lines"></div>
            <hr />
            <div class="d-flex align-items-center justify-content-between">
              <div class="pp-muted">Total</div>
              <div class="fw-semibold" id="pp-pay-total">₱0.00</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="pp-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/payment.js"></script>
  </body>
</html>
